<!DOCTYPE html>
<html lang="nl-BE">
<head>
  <!-- Required meta tags -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contactpagina</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap CSS icons: https://icons.getbootstrap.com/#usage -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- JavaScript: Bootstrap Bundle with Popper -->

    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer>
    </script>
  <!-- eigen geschreven css voor jouw html-bestand -->
   <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">

  <!--Leaflet-->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

     
     <!-- Make sure you put this AFTER Leaflet's CSS -->
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

     <script src="js/script.js" defer></script>
     <script src="js/script2.js" defer></script>

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
            <img src="assets/logo.png" alt="Logo" class="logo">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="portfolio.html">PORTFOLIO</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">CONTACT</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
<main class="container-fluid">
    <div class="row">

        <!-- FORMULIER -->
        <section class="col-lg-8">
            <h1 class="mt-4">Contacteer mij</h1>

            <form name="contact" method="POST" data-netlify="true" data-netlify-recaptcha="true" class="mt-4">

                <div class="mb-3">
                    <label class="form-label">Naam</label>
                    <input type="text" class="form-control" placeholder="Jouw naam">
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" placeholder="jouw@e-mail.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Onderwerp</label>
                    <select class="form-select">
                        <option>Vraag</option>
                        <option>Samenwerking</option>
                        <option>Andere</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Bericht</label>
                    <textarea class="form-control" rows="5" placeholder="Typ hier je bericht..."></textarea>
                </div>
                <div data-netlify-recaptcha="true"></div>
                <button type="submit" class="btn btn-dark">Verstuur</button>

            </form>
        </section>

        <!-- ASIDE -->
        <aside class="col-lg-4">
            <br>
            <h2>Mijn locatie</h2>
            <!-- LEAFLETMAP -->
            <div id="map"></div>
            <br>
            <!-- CONTACT INFO -->
            <div>
                <h3>Contact</h3>
                <br>
                <p><i class="bi bi-envelope"></i> ezzarfanid@hotmail.com</p>
                <br>
                <p><i class="bi bi-linkedin"></i> linkedin.com/in/dinaezzarfani</p>
            </div>

        </aside>

    </div>
</main>
   
    <!-- Footer -->
    <footer class="py-4 mt-5">
        <div class="container text-center">
            <p>© <span id="jaar"></span> Dina Ezzarfani</p>
        </div>
    </footer>

<script>
  document.getElementById("jaar").textContent = new Date().getFullYear();
</script>


</body>
</html>
